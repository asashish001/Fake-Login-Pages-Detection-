<!-- templates/index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishLens | Login Page Detector</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root { --ink:#0d1321; --mint:#4ee1a0; --sun:#ffd166; --rose:#ef476f; --sky:#118ab2; }
    body { font-family: 'Manrope', sans-serif; background: radial-gradient(circle at 10% 20%, #0d1321, #1d2d44 45%, #3e5c76); color: #f8fafc; min-height: 100vh; }
    .title { font-family: 'Space Grotesk', sans-serif; letter-spacing: .5px; }
    .glass { background: rgba(255,255,255,.08); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,.15); }
  </style>
</head>
<body class="px-4 py-8">
  <main class="max-w-4xl mx-auto">
    <section class="glass rounded-3xl p-6 md:p-10 shadow-2xl">
      <h1 class="title text-3xl md:text-5xl font-bold mb-3">PhishLens</h1>
      <p class="text-slate-200 mb-6">Upload a login-page screenshot (.png) and detect whether it is <b>Real</b> or <b>Phishing</b>.</p>

      <form id="uploadForm" class="space-y-4">
        <label class="block border-2 border-dashed border-slate-300/50 rounded-2xl p-6 text-center cursor-pointer hover:border-emerald-300 transition">
          <input id="fileInput" type="file" accept=".png" class="hidden" required />
          <span class="text-lg">Click to choose a PNG image</span>
        </label>

        <div class="grid md:grid-cols-2 gap-6 items-start">
          <div>
            <img id="preview" class="hidden rounded-xl w-full shadow-lg" alt="Preview"/>
          </div>

          <div class="glass rounded-2xl p-5">
            <button id="predictBtn" type="submit" class="w-full bg-emerald-400 text-slate-900 font-bold py-3 rounded-xl hover:bg-emerald-300 transition">
              Analyze Screenshot
            </button>
            <p id="status" class="mt-3 text-sm text-slate-200"></p>

            <div id="resultBox" class="hidden mt-4">
              <p class="text-xl font-semibold">Prediction: <span id="labelText"></span></p>
              <p class="text-sm mt-1">Phishing probability: <span id="phishProb"></span>%</p>

              <div class="mt-3 w-full bg-slate-700 rounded-full h-4 overflow-hidden">
                <div id="bar" class="h-4 rounded-full transition-all duration-500"></div>
              </div>
              <p class="text-sm mt-2">Confidence: <span id="confText"></span>%</p>
            </div>
          </div>
        </div>
      </form>
    </section>
  </main>

  <script>window.PRED_THRESHOLD = {{ threshold }};</script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
